name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cyl_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cyl_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CYL_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cyl_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run backend tests
        run: bash ./gradlew :backend:test --no-daemon

  android:
    name: Android checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android unit tests
        run: bash ./gradlew :androidApp:testDebugUnitTest --no-daemon

      - name: Compile Android instrumentation tests
        run: bash ./gradlew :androidApp:compileDebugAndroidTestKotlin --no-daemon
