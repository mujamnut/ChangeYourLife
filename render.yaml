services:
  - type: web
    name: cyl-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: KTOR_DEVELOPMENT
        value: false
      - key: DATABASE_MAX_POOL_SIZE
        value: 5
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LMSTUDIO_BASE_URL
        sync: false
      - key: LMSTUDIO_API_KEY
        sync: false
      - key: LMSTUDIO_MODEL
        value: qwen/qwen3.5-9b
      - key: LMSTUDIO_VISION_MODEL
        value: qwen/qwen3.5-9b
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-20b:free
      - key: OPENROUTER_VISION_MODELS
        value: google/gemma-4-26b-a4b-it:free,google/gemma-3-4b-it:free,google/gemini-2.0-flash-exp:free
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
